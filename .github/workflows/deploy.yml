name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # প্রধান শাখা

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install  # তোমার প্রয়োজন অনুসারে

      - name: Build (if needed)
        run: npm run build  # যদি তোমার প্রোজেক্টে বিল্ডের প্রয়োজন হয়

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./  # তোমার বিল্ড ফোল্ডার (যদি প্রয়োজন হয়)
